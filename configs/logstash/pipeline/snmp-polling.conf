  # ============================================
  # IP Statistics
  # ============================================
  snmp {
    hosts => [
      { host => "udp:172.20.20.23/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.24/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.25/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.26/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.27/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.28/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.29/161" community => "public" version => "2c" }
    ]
    get => [
      "1.3.6.1.2.1.4.3.0", "1.3.6.1.2.1.4.10.0", "1.3.6.1.2.1.4.11.0",
      "1.3.6.1.2.1.4.14.0", "1.3.6.1.2.1.4.17.0", "1.3.6.1.2.1.4.4.0",
      "1.3.6.1.2.1.4.5.0"
    ]
    interval => 30
    tags => ["snmp_ipstats"]
    add_field => { "[@metadata][pipeline]" => "ipstats" }
  }

  # ============================================
  # OSPF
  # ============================================
  snmp {
    hosts => [
      { host => "udp:172.20.20.23/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.24/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.25/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.26/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.27/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.28/161" community => "public" version => "2c" },
      { host => "udp:172.20.20.29/161" community => "public" version => "2c" }
    ]
    get => ["1.3.6.1.2.1.14.1.1.0", "1.3.6.1.2.1.14.1.2.0", "1.3.6.1.2.1.14.1.12.0"]
