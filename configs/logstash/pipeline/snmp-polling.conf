filter {
  if [host] and [host] !~ /^\{/ {
    mutate { copy => { "[host]" => "[@metadata][host_ip]" } }
    translate {
      source => "[@metadata][host_ip]"
      target => "[@metadata][host_name]"
      dictionary => {
        "172.20.20.23" => "csr23"
        "172.20.20.24" => "csr24"
        "172.20.20.25" => "csr25"
        "172.20.20.26" => "csr26"
        "172.20.20.27" => "csr27"
        "172.20.20.28" => "csr28"
        "172.20.20.29" => "csr29"
      }
      fallback => "unknown"
    }
    mutate { remove_field => ["host"] }
    mutate {
      add_field => {
        "[host][name]"     => "%{[@metadata][host_name]}"
        "[host][hostname]" => "%{[@metadata][host_name]}"
        "[host][ip]"       => "%{[@metadata][host_ip]}"
      }
    }
  }

  if "snmp_system" in [tags] {
    ruby {
      code => '
        uptime = event.get("sysUpTimeInstance") || event.get("sysUpTime.0") || event.get("1.3.6.1.2.1.1.3.0")
        descr = event.get("sysDescr.0") || event.get("1.3.6.1.2.1.1.1.0")
        event.set("system.uptime", uptime)
        event.set("snmp.sys.descr", descr)
        
        ["sysUpTimeInstance", "sysUpTime.0", "1.3.6.1.2.1.1.3.0", "sysDescr.0", "1.3.6.1.2.1.1.1.0", "sysName.0", "1.3.6.1.2.1.1.5.0"].each { |k| event.remove(k) }
      '
    }
  }

  if "snmp_interface" in [tags] {
    split { field => "ifTable" }
    ruby {
      code => '
        row = event.get("ifTable")
        if row
          event.set("if.index", (row["ifIndex"] || row["1.3.6.1.2.1.2.2.1.1"]).to_s)
          event.set("if.name", row["ifDescr"] || row["1.3.6.1.2.1.2.2.1.2"])
          event.set("if.descr", row["ifDescr"] || row["1.3.6.1.2.1.2.2.1.2"])
          event.set("network.interface.admin.status", row["ifAdminStatus"] || row["1.3.6.1.2.1.2.2.1.7"])
          event.set("network.interface.status", row["ifOperStatus"] || row["1.3.6.1.2.1.2.2.1.8"])
          event.set("network.interface.in.bytes", row["ifInOctets"] || row["1.3.6.1.2.1.2.2.1.10"])
          event.set("network.interface.in.ucast.packets", row["ifInUcastPkts"] || row["1.3.6.1.2.1.2.2.1.11"])
          event.set("network.interface.in.discards", row["ifInDiscards"] || row["1.3.6.1.2.1.2.2.1.13"])
          event.set("network.interface.in.errors", row["ifInErrors"] || row["1.3.6.1.2.1.2.2.1.14"])
          event.set("network.interface.out.bytes", row["ifOutOctets"] || row["1.3.6.1.2.1.2.2.1.16"])
          event.set("network.interface.out.ucast.packets", row["ifOutUcastPkts"] || row["1.3.6.1.2.1.2.2.1.17"])
          event.set("network.interface.out.discards", row["ifOutDiscards"] || row["1.3.6.1.2.1.2.2.1.19"])
          event.set("network.interface.out.errors", row["ifOutErrors"] || row["1.3.6.1.2.1.2.2.1.20"])
          event.remove("ifTable")
        end
      '
    }
  }

  if "snmp_interface_hc" in [tags] {
    split { field => "ifXTable" }
    ruby {
      code => '
        row = event.get("ifXTable")
        if row
          event.set("if.name", row["ifName"] || row["1.3.6.1.2.1.31.1.1.1.1"])
          event.set("if.alias", row["ifAlias"] || row["1.3.6.1.2.1.31.1.1.1.18"])
          event.set("network.interface.in.bytes", row["ifHCInOctets"] || row["1.3.6.1.2.1.31.1.1.1.6"])
          event.set("network.interface.out.bytes", row["ifHCOutOctets"] || row["1.3.6.1.2.1.31.1.1.1.10"])
          event.set("network.interface.speed", row["ifHighSpeed"] || row["1.3.6.1.2.1.31.1.1.1.15"])
          event.remove("ifXTable")
        end
      '
    }
  }

  if "snmp_ipstats" in [tags] {
    ruby {
      code => '
        event.set("network.ip.in.receives", event.get("ipInReceives.0") || event.get("1.3.6.1.2.1.4.3.0"))
        event.set("network.ip.forwarded.datagrams", event.get("ipForwDatagrams.0") || event.get("1.3.6.1.2.1.4.6.0"))
        event.set("network.ip.out.requests", event.get("ipOutRequests.0") || event.get("1.3.6.1.2.1.4.10.0"))
        
        ["ipInReceives.0", "1.3.6.1.2.1.4.3.0", "ipForwDatagrams.0", "1.3.6.1.2.1.4.6.0", "ipOutRequests.0", "1.3.6.1.2.1.4.10.0"].each { |k| event.remove(k) }
      '
    }
  }

  if "snmp_tcp" in [tags] {
    ruby {
      code => '
        event.set("network.tcp.active.opens", event.get("tcpActiveOpens.0") || event.get("1.3.6.1.2.1.6.5.0"))
        event.set("network.tcp.curr.estab", event.get("tcpCurrEstab.0") || event.get("1.3.6.1.2.1.6.9.0"))
        event.set("network.tcp.in.segs", event.get("tcpInSegs.0") || event.get("1.3.6.1.2.1.6.10.0"))
        event.set("network.tcp.out.segs", event.get("tcpOutSegs.0") || event.get("1.3.6.1.2.1.6.11.0"))
        
        ["tcpActiveOpens.0", "1.3.6.1.2.1.6.5.0", "tcpCurrEstab.0", "1.3.6.1.2.1.6.9.0", "tcpInSegs.0", "1.3.6.1.2.1.6.10.0", "tcpOutSegs.0", "1.3.6.1.2.1.6.11.0"].each { |k| event.remove(k) }
      '
    }
  }

  if "snmp_udp" in [tags] {
    ruby {
      code => '
        event.set("network.udp.in.datagrams", event.get("udpInDatagrams.0") || event.get("1.3.6.1.2.1.7.1.0"))
        event.set("network.udp.out.datagrams", event.get("udpOutDatagrams.0") || event.get("1.3.6.1.2.1.7.4.0"))
        
        ["udpInDatagrams.0", "1.3.6.1.2.1.7.1.0", "udpOutDatagrams.0", "1.3.6.1.2.1.7.4.0"].each { |k| event.remove(k) }
      '
    }
  }

  if "snmp_arp" in [tags] {
    split { field => "arpTable" }
    ruby {
      code => '
        row = event.get("arpTable")
        if row
          event.set("arp.ifindex", (row["ipNetToMediaIfIndex"] || row["1.3.6.1.2.1.4.22.1.1"]).to_s)
          event.set("arp.mac", row["ipNetToMediaPhysAddress"] || row["1.3.6.1.2.1.4.22.1.2"])
          event.set("arp.ip", row["ipNetToMediaNetAddress"] || row["1.3.6.1.2.1.4.22.1.3"])
          event.set("network.arp.entry", row["ipNetToMediaType"] || row["1.3.6.1.2.1.4.22.1.4"])
          event.remove("arpTable")
        end
      '
    }
  }

  if "snmp_lldp" in [tags] {
    split { field => "lldpRemTable" }
    ruby {
      code => '
        row = event.get("lldpRemTable")
        if row
          sysname = row["lldpRemSysName"] || row["1.0.8802.1.1.2.1.4.1.1.9"]
          portid = row["lldpRemPortId"] || row["1.0.8802.1.1.2.1.4.1.1.7"]
          
          event.set("network.lldp.rem.sysname", sysname)
          event.set("network.lldp.rem.portid", portid)
          event.set("network.lldp.neighbors", row["lldpRemChassisIdSubtype"] || row["1.0.8802.1.1.2.1.4.1.1.4"])
          
          safe_sysname = sysname || "unknown"
          safe_portid = portid || ""
          event.set("lldp.neighbor.id", "neighbor.#{safe_sysname}.#{safe_portid}")
          event.remove("lldpRemTable")
        end
      '
    }
    if [network.lldp.rem.sysname] == "" or ![network.lldp.rem.sysname] {
      drop {}
    }
  }

  if "snmp_memory" in [tags] {
    split { field => "hrStorageTable" }
    ruby {
      code => '
        row = event.get("hrStorageTable")
        if row
          event.set("hr.storage.index", (row["hrStorageIndex"] || row["1.3.6.1.2.1.25.2.3.1.1"]).to_s)
          event.set("memory.pool.name", row["hrStorageDescr"] || row["1.3.6.1.2.1.25.2.3.1.3"])
          event.set("system.memory.allocation.units", row["hrStorageAllocationUnits"] || row["1.3.6.1.2.1.25.2.3.1.4"])
          event.set("system.memory.size", row["hrStorageSize"] || row["1.3.6.1.2.1.25.2.3.1.5"])
          event.set("system.memory.used", row["hrStorageUsed"] || row["1.3.6.1.2.1.25.2.3.1.6"])
          event.remove("hrStorageTable")
        end
      '
    }
  }

  mutate {
    add_field => {
      "[data_stream][type]" => "metrics"
      "[data_stream][namespace]" => "prod"
    }
  }

  if [@metadata][pipeline] == "system" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.system" } }
  } else if [@metadata][pipeline] == "interface" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.interface" } }
  } else if [@metadata][pipeline] == "ipstats" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.ipstats" } }
  } else if [@metadata][pipeline] == "tcp" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.tcp" } }
  } else if [@metadata][pipeline] == "udp" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.udp" } }
  } else if [@metadata][pipeline] == "arp" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.arp" } }
  } else if [@metadata][pipeline] == "lldp" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.lldp" } }
  } else if [@metadata][pipeline] == "memory" {
    mutate { add_field => { "[data_stream][dataset]" => "snmp.memory" } }
  }

  mutate {
    remove_field => ["@version"]
    remove_tag => ["snmp_system", "snmp_interface", "snmp_interface_hc", "snmp_ipstats", "snmp_tcp", "snmp_udp", "snmp_arp", "snmp_lldp", "snmp_memory"]
  }
}

output {
  stdout { codec => dots }
  elasticsearch {
    hosts => ["${ES_ENDPOINT}"]
    api_key => "${ES_API_KEY}"
    data_stream => true
    data_stream_type => "metrics"
    data_stream_dataset => "%{[data_stream][dataset]}"
    data_stream_namespace => "prod"
  }
}