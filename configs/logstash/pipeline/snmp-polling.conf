filter {
  # 1. SMART HOST EXTRACTOR (Done in Ruby)
  ruby {
    code => '
      ip = event.get("[@metadata][host_address]") || event.get("[host][ip]")
      if ip.nil? && event.get("host").is_a?(String)
        ip = event.get("host")
      end
      
      if ip
        clean_ip = ip.gsub("udp:", "").split("/").first
        event.set("[@metadata][host_ip]", clean_ip)
        
        map = {
          "172.20.20.23" => "csr23", "172.20.20.24" => "csr24",
          "172.20.20.25" => "csr25", "172.20.20.26" => "csr26",
          "172.20.20.27" => "csr27", "172.20.20.28" => "csr28",
          "172.20.20.29" => "csr29"
        }
        
        hostname = map[clean_ip] || "unknown"
        event.set("[host][name]", hostname)
        event.set("[host][hostname]", hostname)
        event.set("[host][ip]", clean_ip)
      end
    '
  }

  if "snmp_system" in [tags] {
    ruby {
      code => '
        event.to_hash.each do |k, v|
          if v.is_a?(String) && v.start_with?("error:")
            event.remove(k); next
          end
          case k
          when /sysUpTime/, /1\.1\.3\.0/ then event.set("system.uptime", v); event.remove(k)
          when /sysDescr/, /1\.1\.1\.0/ then event.set("snmp.sys.descr", v); event.remove(k)
          when /sysName/, /1\.1\.5\.0/ then event.set("snmp.sys.name", v); event.remove(k)
          end
        end
      '
    }
  }

  if "snmp_cpu" in [tags] {
    ruby {
      code => '
        event.to_hash.each do |k, v|
          if v.is_a?(String) && v.start_with?("error:")
            event.remove(k); next
          end
          case k
          when /ssCpuUser/, /2021\.11\.9\.0/ then event.set("system.cpu.user.pct", v.to_f / 100); event.remove(k)
          when /ssCpuSystem/, /2021\.11\.10\.0/ then event.set("system.cpu.system.pct", v.to_f / 100); event.remove(k)
          when /ssCpuIdle/, /2021\.11\.11\.0/
            event.set("system.cpu.idle.pct", v.to_f / 100)
            event.set("system.cpu.total.pct", (100.0 - v.to_f) / 100)
            event.remove(k)
          when /2021\.11\.50\.0/, /2021\.11\.52\.0/, /2021\.11\.53\.0/
            event.remove(k)
          end
        end
      '
    }
  }

  if "snmp_memory" in [tags] {
    ruby {
      code => '
        event.to_hash.each do |k, v|
          if v.is_a?(String) && v.start_with?("error:")
            event.remove(k); next
          end
          case k
          when /memTotalReal/, /2021\.4\.5\.0/  then event.set("system.memory.total", v.to_i * 1024); event.remove(k)
          when /memAvailReal/, /2021\.4\.6\.0/  then event.set("system.memory.free", v.to_i * 1024); event.remove(k)
          when /memBuffer/, /2021\.4\.14\.0/     then event.set("system.memory.buffered", v.to_i * 1024); event.remove(k)
          when /memCached/, /2021\.4\.15\.0/     then event.set("system.memory.cached", v.to_i * 1024); event.remove(k)
          when /memTotalSwap/, /2021\.4\.3\.0/  then event.set("system.memory.swap.total", v.to_i * 1024); event.remove(k)
          when /memAvailSwap/, /2021\.4\.4\.0/  then event.set("system.memory.swap.free", v.to_i * 1024); event.remove(k)
          end
        end

        total = event.get("system.memory.total").to_i
        free  = event.get("system.memory.free").to_i
        if total > 0
          used = total - free
          event.set("system.memory.used", used)
          event.set("system.memory.used_pct", (used.to_f / total).round(4))
        end
      '
    }
  }

  if "snmp_interface" in [tags] {
    split { field => "ifTable" }
    ruby {
      code => '
        row = event.get("ifTable")
        if row
          row.each do |k, v|
            if v.is_a?(String) && v.start_with?("error:")
              next
            end
            case k
            when /ifIndex/, /2\.2\.1\.1\./ then event.set("if.index", v.to_s)
            when /ifDescr/, /2\.2\.1\.2\./ then event.set("if.descr", v); event.set("if.name", v)
            when /ifAdminStatus/, /2\.2\.1\.7\./ then event.set("network.interface.admin.status", v)
            when /ifOperStatus/, /2\.2\.1\.8\./ then event.set("network.interface.status", v)
            when /ifInOctets/, /2\.2\.1\.10\./ then event.set("network.interface.in.bytes", v)
            when /ifInUcastPkts/, /2\.2\.1\.11\./ then event.set("network.interface.in.ucast.packets", v)
            when /ifInDiscards/, /2\.2\.1\.13\./ then event.set("network.interface.in.discards", v)
            when /ifInErrors/, /2\.2\.1\.14\./ then event.set("network.interface.in.errors", v)
            when /ifOutOctets/, /2\.2\.1\.16\./ then event.set("network.interface.out.bytes", v)
            when /ifOutUcastPkts/, /2\.2\.1\.17\./ then event.set("network.interface.out.ucast.packets", v)
            when /ifOutDiscards/, /2\.2\.1\.19\./ then event.set("network.interface.out.discards", v)
            when /ifOutErrors/, /2\.2\.1\.20\./ then event.set("network.interface.out.errors", v)
            end
          end
          event.remove("ifTable")
        end
      '
    }
  }

  if "snmp_interface_hc" in [tags] {
    split { field => "ifXTable" }
    ruby {
      code => '
        row = event.get("ifXTable")
        if row
          row.each do |k, v|
            if v.is_a?(String) && v.start_with?("error:")
              next
            end
            case k
            when /ifName/, /31\.1\.1\.1\.1\./ then event.set("if.name", v)
            when /ifHCInOctets/, /31\.1\.1\.1\.6\./ then event.set("network.interface.in.bytes", v)
            when /ifHCInUcastPkts/, /31\.1\.1\.1\.7\./ then event.set("network.interface.in.ucast.packets", v)
            when /ifHCOutOctets/, /31\.1\.1\.1\.10\./ then event.set("network.interface.out.bytes", v)
            when /ifHCOutUcastPkts/, /31\.1\.1\.1\.11\./ then event.set("network.interface.out.ucast.packets", v)
            when /ifHighSpeed/, /31\.1\.1\.1\.15\./ then event.set("network.interface.speed", v)
            when /ifAlias/, /31\.1\.1\.1\.18\./ then event.set("if.alias", v)
            end
          end
          event.remove("ifXTable")
        end
      '
    }
  }

  if "snmp_ipstats" in [tags] {
    ruby {
      code => '
        event.to_hash.each do |k, v|
          if v.is_a?(String) && v.start_with?("error:")
            event.remove(k); next
          end
          case k
          when /ipInReceives/, /4\.3\.0/ then event.set("network.ip.in.receives", v); event.remove(k)
          when /ipForwDatagrams/, /4\.10\.0/ then event.set("network.ip.forwarded.datagrams", v); event.remove(k)
          when /ipOutRequests/, /4\.11\.0/ then event.set("network.ip.out.requests", v); event.remove(k)
          when /ipInDiscards/, /4\.14\.0/ then event.set("network.ip.in.discards", v); event.remove(k)
          when /ipOutDiscards/, /4\.17\.0/ then event.set("network.ip.out.discards", v); event.remove(k)
          when /ipInHdrErrors/, /4\.4\.0/ then event.set("network.ip.in.errors", v); event.remove(k)
          when /ipInAddrErrors/, /4\.5\.0/ then event.set("network.ip.in.address_errors", v); event.remove(k)
          end
        end
      '
    }
  }

  if "snmp_ospf" in [tags] {
    ruby {
      code => '
        state_map = {
          1 => "down", 2 => "attempt", 3 => "init",
          4 => "twoWay", 5 => "exchangeStart",
          6 => "exchange", 7 => "loading", 8 => "full"
        }
        
        event.to_hash.each do |k, v|
          if v.is_a?(String) && v.start_with?("error:")
            event.remove(k); next
          end
          case k
          when /ospfRouterId/, /14\.1\.1\.0/ then event.set("ospf.router.id", v); event.remove(k)
          when /ospfAdminStat/, /14\.1\.2\.0/ then event.set("ospf.admin.status", v); event.remove(k)
          when /ospfExternLsaCount/, /14\.1\.12\.0/ then event.set("ospf.lsa.external.count", v); event.remove(k)
          end
        end

        if event.get("ospfNbrTable")
          event.get("ospfNbrTable").each do |k, v|
            if v.is_a?(String) && v.start_with?("error:")
              next
            end
            case k
            when /ospfNbrIpAddr/, /14\.10\.1\.1\./ then event.set("ospf.neighbor.ip", v)
            when /ospfNbrRtrId/, /14\.10\.1\.3\./ then event.set("ospf.neighbor.router_id", v)
            when /ospfNbrState/, /14\.10\.1\.6\./
              event.set("ospf.neighbor.state_code", v.to_i)
              event.set("ospf.neighbor.state", state_map[v.to_i] || "unknown")
              event.set("ospf.neighbor.is_full", v.to_i == 8)
            when /ospfNbrEvents/, /14\.10\.1\.7\./ then event.set("ospf.neighbor.events", v.to_i)
            when /ospfNbrLsRetransQ/, /14\.10\.1\.8\./ then event.set("ospf.neighbor.retrans_q", v.to_i)
            end
          end
          event.remove("ospfNbrTable")
        end
        
        if event.get("ospfIfTable")
          event.get("ospfIfTable").each do |k, v|
            if v.is_a?(String) && v.start_with?("error:")
              next
            end
            case k
            when /ospfIfIpAddress/, /14\.7\.1\.1\./ then event.set("ospf.interface.ip", v)
            when /ospfIfAdminStat/, /14\.7\.1\.5\./ then event.set("ospf.interface.admin_status", v)
            when /ospfIfState/, /14\.7\.1\.12\./ then event.set("ospf.interface.state", v)
            end
          end
          event.remove("ospfIfTable")
        end
      '
    }
  }

  mutate {
    add_field => {
      "[data_stream][type]"      => "metrics"
      "[data_stream][namespace]" => "prod"
    }
  }

  if [@metadata][pipeline] {
    mutate {
      add_field => { "[data_stream][dataset]" => "snmp.%{[@metadata][pipeline]}" }
    }
  }

  mutate {
    remove_field => ["@version"]
    remove_tag   => [
      "snmp_system", "snmp_interface", "snmp_interface_hc",
      "snmp_cpu", "snmp_memory", "snmp_ipstats", "snmp_ospf"
    ]
  }
}

output {
  elasticsearch {
    hosts              => ["${ES_ENDPOINT}"]
    api_key            => "${ES_API_KEY}"
    data_stream        => true
    data_stream_type   => "metrics"
    data_stream_dataset   => "%{[data_stream][dataset]}"
    data_stream_namespace => "prod"
  }
}
